# --- Brique 4 : Base de Données Vecteur SOTA (Qdrant) (POC 82) ---
QDRANT_HOST = localhost
QDRANT_PORT = 6333
# Nom de la "collection" (similaire à une "table")
QDRANT_COLLECTION_NAME = code_metadata