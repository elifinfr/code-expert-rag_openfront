[DEFAULT]
# Chemin vers le code source à analyser (RELATIF à config.ini)
CODE_DIRECTORY = ./OpenFrontIO

# Chemin pour stocker la base de données vectorielle (RELATIF à config.ini)
VECTORDB_PATH = ./chroma_db_code

# --- GENERATION : LM Studio (API OpenAI-compatible), port 1234 ---
LLM_BASE_URL = http://192.168.1.29:1234/v1
LLM_API_KEY = lm-studio
# Modele INSTRUCT (pas de "thinking") -> rapide pour resumes/synthese/tool-calling.
GENERATION_MODEL = qwen3-4b-instruct-2507
# Alternative MoE dispo (a benchmarker) :
# GENERATION_MODEL = qwen3.6-35b-a3b-uncensored-genesis-v2-apex-mtp

# --- EMBEDDINGS : llama-server dedie (nomic-embed-code), port 8090 ---
# nomic-embed-code = embedder 7B SOTA pour le CODE (bat Voyage/OpenAI sur CodeSearchNet).
# Servi via : tools/llamacpp/llama-server.exe --embeddings --pooling last (cf. scripts/).
# N'est PAS servable par LM Studio (detecte en type=llm) -> serveur dedie obligatoire.
EMBEDDING_BASE_URL = http://localhost:8090/v1
EMBEDDING_API_KEY = none
EMBEDDING_MODEL = nomic-embed-code
# GGUF servi par llama-server (utilise par main.py pour demarrer le serveur d'embeddings)
EMBEDDING_GGUF = C:\Users\admin\.cache\lm-studio\models\mradermacher\nomic-embed-code-GGUF\nomic-embed-code.Q4_K_S.gguf
# Task-prefix requete (README nomic-embed-code) ; documents/code = bruts (pas de prefixe).
EMBEDDING_QUERY_PREFIX = Represent this query for searching relevant code:

# Ancienne config Ollama (conservee pour les modules legacy non encore migres)
OLLAMA_BASE_URL = http://172.24.64.1:11434

# Configuration pour Tree-sitter (téléchargez le .so ou .dll correspondant à votre OS)
TS_LANGUAGE_PATH = /home/chris/miniconda3/envs/py312/lib/python3.12/site-packages/tree_sitter_languages/languages.so

RERANKER_MODEL = BAAI/bge-reranker-v2-m3
RETRIEVER_TOP_K = 50

; --- MODIFICATION (Validé POC 44) ---
; Nous n'utilisons plus le CrossEncoder (trop lent).
; Nous utilisons un seuil de similarité d'embedding.
; Ajustez ce seuil (0.0 - 1.0) pour plus/moins de résultats.
EMBEDDING_FILTER_THRESHOLD = 0.3


# Neo4j Configuration
NEO4J_URI = bolt://localhost:7687
NEO4J_USER = neo4j
NEO4J_PASSWORD = password

# Backbone du graphe (Sprint 2) : 'scip' (SCIP-in-Docker, defaut) ou 'tsmorph' (rollback).
