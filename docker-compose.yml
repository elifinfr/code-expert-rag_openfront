version: '3.8'

services:
  # ============================================
  # Neo4j - Base de données graphe
  # ============================================
  neo4j:
    image: neo4j:5.15
    container_name: code-expert-neo4j
    ports:
      - "7474:7474"  # Interface web
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - code-expert-network

  # ============================================
  # API REST - Backend
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-expert-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./src:/app/src
      - ./chroma_db_code:/app/chroma_db_code
      - ./config.ini:/app/config.ini
      - ./project_manifest.txt:/app/project_manifest.txt
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - code-expert-network
    command: uvicorn src.agent.api:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # Frontend (optionnel - à créer)
  # ============================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: code-expert-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000
  #   depends_on:
  #     - api
  #   networks:
  #     - code-expert-network

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  code-expert-network:
    driver: bridge
